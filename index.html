<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Prompt</title>
  <meta name="description" content="AI Prompt 文档与提示词整理" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --border: #e4e7ec;
      --accent: #2563eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1020;
        --card: #121a2f;
        --text: #eef2ff;
        --muted: #a7b0c4;
        --border: #24304a;
        --accent: #60a5fa;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(37, 99, 235, .14), transparent 32rem), var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: clamp(28px, 6vw, 56px);
      box-shadow: 0 20px 60px rgba(15, 23, 42, .12);
    }
    .eyebrow {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(34px, 7vw, 64px);
      line-height: 1.02;
      margin: 0 0 18px;
    }
    p {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
      margin: 0 0 24px;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 650;
    }
    .primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">AI Prompt</div>
    <h1>AI 提示词与文档整理</h1>
    <p>这个站点用于整理、展示和复用 AI Prompt。后续可以继续把提示词、阅读流程、自动化模板和使用说明放到这里。</p>
    <p>当前版本是为 Vercel 部署准备的最小静态页面。</p>
    <div class="links">
      <a class="button primary" href="https://github.com/Aslce/AI-prompt">查看 GitHub 仓库</a>
      <a class="button" href="https://github.com/Aslce/AI-prompt/blob/main/README.md">查看 README</a>
    </div>
  </main>
</body>
</html>
