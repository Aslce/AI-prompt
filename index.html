<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Prompt Template Generator</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",system-ui,sans-serif;background:#f5f5f7;color:#1d1d1f}.top{position:sticky;top:0;background:#ffffffcc;backdrop-filter:blur(18px);border-bottom:1px solid #0001}.top div{max-width:1180px;height:48px;margin:auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between}.wrap{max-width:1180px;margin:auto;padding:0 22px 46px}.hero{text-align:center;padding:64px 0 30px}.hero h1{font-size:clamp(38px,7vw,76px);line-height:.96;letter-spacing:-.055em;margin:0}.hero p{color:#6e6e73;font-size:20px;max-width:760px;margin:18px auto}.ai,.tpl{display:grid;gap:12px}.ai{grid-template-columns:repeat(3,1fr);max-width:760px;margin:28px auto 0}.tpl{grid-template-columns:repeat(2,1fr);margin-bottom:18px}.ai button,.tpl button{border:1px solid #0002;background:#fff;color:#1d1d1f;border-radius:20px;padding:16px;text-align:left;cursor:pointer;box-shadow:0 4px 18px #0000000a}.ai button.active,.tpl button.active{border-color:#0071e3;box-shadow:0 0 0 4px #0071e31f}.ai strong,.tpl strong{display:block;font-size:17px;margin-bottom:5px}.ai span,.tpl span{display:block;color:#6e6e73;font-size:13px}.grid{display:grid;grid-template-columns:1fr 500px;gap:22px;align-items:start}.panel{background:#ffffffd9;border:1px solid #0001;border-radius:28px;box-shadow:0 20px 60px #00000017;overflow:hidden}.head{padding:22px 24px;border-bottom:1px solid #0001;display:flex;justify-content:space-between;gap:16px}.head h2{margin:0 0 4px}.head p{margin:0;color:#6e6e73;font-size:14px}.body{padding:22px 24px}.tips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}.tip{border:1px solid #0002;background:#fff;color:#6e6e73;border-radius:999px;padding:7px 10px;font-size:12px}.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:7px}.full{grid-column:1/-1}label{font-weight:750;font-size:13px}input,textarea{width:100%;box-sizing:border-box;border:1px solid #0002;background:#fff;color:#1d1d1f;border-radius:14px;padding:12px;font:inherit;outline:none}textarea{min-height:98px;resize:vertical;line-height:1.5}input:focus,textarea:focus{border-color:#0071e3;box-shadow:0 0 0 4px #0071e31f}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.btn{border:1px solid #0002;background:#fff;color:#1d1d1f;border-radius:999px;padding:11px 16px;font-weight:800;cursor:pointer}.primary{background:#0071e3;border-color:#0071e3;color:white}.preview{position:sticky;top:70px}pre{margin:0;white-space:pre-wrap;word-break:break-word;min-height:560px;background:#1d1d1f;color:#f5f5f7;border-radius:20px;padding:18px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;line-height:1.62}.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.stat{background:#fff;border:1px solid #0001;border-radius:16px;padding:12px}.stat strong{display:block;font-size:20px}.stat span{color:#6e6e73;font-size:12px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);background:#1d1d1fee;color:#fff;padding:10px 15px;border-radius:999px;opacity:0;transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}footer{color:#6e6e73;font-size:12px;padding:26px 0}@media(max-width:980px){.grid{grid-template-columns:1fr}.preview{position:static}pre{min-height:360px}}@media(max-width:720px){.wrap{padding:0 14px 32px}.ai,.tpl,.form{grid-template-columns:1fr}.hero{padding-top:46px}}
</style>
</head>
<body>
<header class="top"><div><strong>AI Prompt</strong><a href="https://github.com/Aslce/AI-prompt" style="color:#6e6e73;text-decoration:none">GitHub</a></div></header>
<main class="wrap">
<section class="hero"><p>ChatGPT · Gemini · DeepSeek</p><h1>一个页面，生成三类 AI 提示词。</h1><p>选择 AI，再选择对应模板，填写内容后生成 Prompt。支持复制、下载 TXT 和下载 MD。</p><div class="ai" id="aiTabs"></div></section>
<section class="grid"><div class="panel"><div class="head"><div><h2>选择模板并填写内容</h2><p id="hint">选择模板后可继续修改字段。</p></div><button class="btn" id="reset">重置</button></div><div class="body"><div class="tpl" id="tpls"></div><div class="tips" id="tips"></div><div class="form"><div class="field full"><label>Role / 角色</label><input id="role"></div><div class="field full"><label>Task / 任务</label><textarea id="task"></textarea></div><div class="field full"><label>Context / 背景资料</label><textarea id="context"></textarea></div><div class="field full"><label>Requirements / 必须遵守</label><textarea id="requirements"></textarea></div><div class="field"><label>Output Format / 输出格式</label><textarea id="format"></textarea></div><div class="field"><label>Style / 风格</label><textarea id="style"></textarea></div><div class="field"><label>Audience / 受众</label><input id="audience" placeholder="例如：初学者、管理层、开发者"></div><div class="field"><label>Extra / 额外约束</label><input id="extra" placeholder="例如：500字以内、只输出 JSON"></div></div><div class="actions"><button class="btn primary" id="gen">生成提示词</button><button class="btn" id="copy">复制</button><button class="btn" id="downTxt">下载 TXT</button><button class="btn" id="downMd">下载 MD</button></div></div></div><aside class="panel preview"><div class="head"><div><h2>生成结果</h2><p><span id="curAI">ChatGPT</span> · <span id="curTpl">通用万能 Prompt</span></p></div></div><div class="body"><div class="meta"><div class="stat"><strong id="chars">0</strong><span>字符</span></div><div class="stat"><strong id="lines">0</strong><span>行</span></div><div class="stat"><strong id="count">0</strong><span>模板</span></div></div><pre id="out"></pre></div></aside></section><footer>纯静态 HTML，输入只在浏览器本地处理。</footer>
</main><div class="toast" id="toast">已复制</div>
<script>
const DATA={ChatGPT:{universal:{name:"通用万能 Prompt",desc:"适合写作、总结、分析和执行任务。",d:{role:"你是专业、严谨、结构化的 AI 助手。",task:"请完成以下任务，并给出可直接使用的结果。",context:"在这里粘贴背景资料或原始内容。",requirements:"- 覆盖所有用户要求\n- 信息不足时说明缺失项\n- 不编造事实\n- 输出前检查格式",format:"Markdown：结论 / 依据 / 步骤 / 下一步",style:"清晰、专业、简洁"},tips:["指令前置","分隔符隔离资料","输出契约"]},research:{name:"研究 / 搜索 / 引用",desc:"适合调研、资料整理、综述。",d:{role:"你是严谨的研究助理，擅长证据整合。",task:"研究指定主题，输出有依据的结论。",context:"主题、范围、地区、时间限制、来源偏好。",requirements:"- 优先可靠来源\n- 比较不同来源\n- 标注不确定性",format:"核心结论 / 证据表 / 分歧 / 建议",style:"客观、证据优先"},tips:["事实与推断分离","标注不确定性"]},agent:{name:"Agent / 工具执行",desc:"适合多步骤任务和文件处理。",d:{role:"你是可靠的任务执行型 Agent。",task:"在当前回合内尽可能完整完成任务。",context:"任务背景、可用资源、限制条件。",requirements:"- 不要停在计划\n- 工具失败时给替代路径\n- 完成后验证",format:"完成结果 / 验证结果 / 未完成项",style:"直接、务实"},tips:["实际推进","验证结果"]},codex:{name:"Codex / DevOps",desc:"适合代码、CLI、部署。",d:{role:"你是 DevOps 自动化工程师。",task:"自动完成安装、配置、验证，并排查失败。",context:"系统版本、芯片、环境状态。",requirements:"- 执行命令\n- 处理依赖\n- 运行验证",format:"状态 / 变更 / 验证命令 / 风险",style:"可复现、稳定"},tips:["说明环境","要求验证命令"]},json:{name:"JSON / 结构化输出",desc:"适合 API 和机器可读输出。",d:{role:"你是严格的结构化数据生成器。",task:"把输入内容转换为指定 JSON Schema。",context:"输入内容。",requirements:"- 只输出 JSON\n- 缺失值使用 null\n- 不添加 Markdown",format:"JSON",style:"精确、机器可读"},tips:["只输出 JSON","缺失值 null"]}},Gemini:{ptcf:{name:"PTCF 黄金四要素",desc:"Persona / Task / Context / Format。",d:{role:"拥有明确专业背景的专家",task:"请完成以下核心任务",context:"业务背景、资料来源、目标受众或约束。",requirements:"- 指令清晰\n- 使用分隔符\n- 优先说明应该做什么",format:"标题、要点和结论",style:"清晰、适合长上下文"},tips:["Persona","Task","Context","Format"]},code:{name:"代码审查与重构",desc:"高级前端架构师 + 代码审查。",d:{role:"拥有10年经验的高级前端架构师",task:"审查并重构以下代码，以提升性能和可读性",context:"粘贴代码、环境和目标。",requirements:"- 指出问题\n- 给出重构代码\n- 保持功能不变",format:"问题列表 / 重构代码 / 改动说明",style:"专业、具体"},tips:["长上下文","具体理由"]},data:{name:"数据提取与总结",desc:"提取关键数据并生成报告。",d:{role:"专业的数据分析师和商业顾问",task:"提取文本中的关键数据，并生成总结报告",context:"原始文本、表格或业务资料。",requirements:"- 提取实体和数值\n- 区分事实与推断",format:"表格 + 简短报告 + 建议",style:"客观、结构化"},tips:["表格更稳定","标注来源"]},marketing:{name:"营销文案",desc:"面向目标受众生成文案。",d:{role:"资深文案策划",task:"针对目标受众撰写营销推文",context:"产品、受众、渠道、品牌语气。",requirements:"- 突出卖点\n- 避免夸大\n- 包含 CTA",format:"3 个版本：标题 / 正文 / CTA",style:"自然、有吸引力"},tips:["明确渠道","多个版本"]}},DeepSeek:{rtf:{name:"RTF 简单框架",desc:"Role - Task - Format。",d:{role:"你是该领域的专业助手",task:"完成以下任务",context:"必要背景。",requirements:"- 明确目标\n- 不输出无关内容",format:"按指定格式输出",style:"简洁、直接"},tips:["简单任务优先"]},trace:{name:"TRACE 复杂项目",desc:"Task / Request / Action / Context / Example。",d:{role:"结构化问题解决专家",task:"完成复杂项目任务",context:"项目背景、资源、约束、示例。",requirements:"- 拆解任务\n- 明确行动步骤\n- 结合上下文",format:"任务理解 / 步骤 / 结果 / 风险",style:"系统化、可执行"},tips:["复杂项目","加入示例"]},cot:{name:"CoT 深度推理",desc:"适合复杂判断和推理。",d:{role:"严谨的推理助手",task:"分析问题并给出最终答案",context:"已知条件、限制、数据。",requirements:"- 列关键条件\n- 分步骤推理\n- 最后自检",format:"条件 / 推理 / 结论 / 自检",style:"严谨、逐步"},tips:["假设透明","自检"]},costar:{name:"CO-STAR 内容创作",desc:"Context / Objective / Style / Tone / Audience / Response。",d:{role:"内容策略师和写作专家",task:"基于目标受众创作内容",context:"背景、目标、受众、渠道、素材。",requirements:"- 贴合受众\n- 语气一致\n- 可直接发布",format:"标题 / 正文 / CTA / 备选",style:"按指定风格"},tips:["控制受众和语气"]}}};
const desc={ChatGPT:"OpenAI 规范模板",Gemini:"PTCF 与长上下文模板",DeepSeek:"RTF / TRACE / CoT / CO-STAR"};let state={ai:"ChatGPT",tpl:"universal"};const ids=["role","task","context","requirements","format","style","audience","extra"],$=id=>document.getElementById(id),first=o=>Object.keys(o)[0];function renderTabs(){aiTabs.innerHTML=Object.keys(DATA).map(ai=>`<button class="${ai===state.ai?'active':''}" data-ai="${ai}"><strong>${ai}</strong><span>${desc[ai]}</span></button>`).join('');aiTabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.ai=b.dataset.ai;state.tpl=first(DATA[state.ai]);render(true)})}function renderTpls(){tpls.innerHTML=Object.entries(DATA[state.ai]).map(([k,v])=>`<button class="${k===state.tpl?'active':''}" data-tpl="${k}"><strong>${v.name}</strong><span>${v.desc}</span></button>`).join('');tpls.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.tpl=b.dataset.tpl;apply();render(false)});count.textContent=Object.keys(DATA[state.ai]).length}function apply(){let d=DATA[state.ai][state.tpl].d;ids.forEach(id=>$(id).value=d[id]||'')}function updateInfo(){let t=DATA[state.ai][state.tpl];tips.innerHTML=(t.tips||[]).map(x=>`<span class="tip">${x}</span>`).join('');curAI.textContent=state.ai;curTpl.textContent=t.name;hint.textContent=t.desc}function values(){let d={};ids.forEach(id=>d[id]=$(id).value.trim());return d}function build(){let d=values(),t=DATA[state.ai][state.tpl];if(state.ai==='Gemini')return `# Persona\n${d.role}\n\n# Task\n${d.task}\n\n# Context\n---\n${d.context}\n---\n\n# Format & Constraints\n${d.format}\n\n# Requirements\n${d.requirements}\n\n# Style\n${d.style}\n${d.audience?`\n# Audience\n${d.audience}\n`:''}${d.extra?`\n# Extra\n${d.extra}\n`:''}\n# Gemini Notes\n请充分利用长上下文能力，先整体理解材料，再输出结果。`;if(state.ai==='DeepSeek')return `# DeepSeek Prompt Framework: ${t.name}\n\n## Role\n${d.role}\n\n## Task\n${d.task}\n\n## Context\n${d.context}\n\n## Constraints\n${d.requirements}\n\n## Output Format\n${d.format}\n\n## Style\n${d.style}\n${d.audience?`\n## Audience\n${d.audience}\n`:''}${d.extra?`\n## Extra Constraints\n${d.extra}\n`:''}\n## Self-check\n请检查是否满足任务、格式和约束。`;return `# 使用模型\nChatGPT\n\n# 模板\n${t.name}\n\n# Role / 角色\n${d.role}\n\n# Task / 任务\n${d.task}\n\n# Context / 背景资料\n\"\"\"\n${d.context}\n\"\"\"\n\n# Requirements / 必须遵守\n${d.requirements}\n\n# Output Contract / 输出契约\n${d.format}\n\n# Style / 风格\n${d.style}\n${d.audience?`\n# Audience\n${d.audience}\n`:''}${d.extra?`\n# Extra\n${d.extra}\n`:''}\n# Final Check\n输出前请检查是否完整满足所有要求。`}function gen(){let txt=build();out.textContent=txt;chars.textContent=txt.length;lines.textContent=txt.split('\n').length}function render(fill=false){renderTabs();renderTpls();updateInfo();if(fill)apply();gen()}function toast(m){let e=$('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1400)}function download(ext,type){let blob=new Blob([out.textContent],{type:type+';charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`${state.ai}-${state.tpl}-prompt.${ext}`;a.click();URL.revokeObjectURL(url)}gen.onclick=gen;reset.onclick=()=>{apply();gen()};copy.onclick=async()=>{try{await navigator.clipboard.writeText(out.textContent);toast('已复制提示词')}catch(e){toast('复制失败')}};downTxt.onclick=()=>download('txt','text/plain');downMd.onclick=()=>download('md','text/markdown');ids.forEach(id=>$(id).addEventListener('input',gen));render(true);
</script>
</body>
</html>
